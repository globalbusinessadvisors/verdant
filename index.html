*{box-sizing:border-box}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ═══════════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════════ */
const P = { nodes:200, rf:800, zones:8, elev:1, conn:true, rot:true, data:true };
const TW=13, TH=25, SX=120, SZ=220, ES=4;
let evtCount=0, linkCount=0, nodePos=[], nodeZn=[];

/* ═══════════════════════════════════════════════════════════════
   VERMONT BOUNDARY  (normalized [0,1] — wider at north, narrow south)
   ═══════════════════════════════════════════════════════════════ */
const VB=[
 [.05,0],[.48,0],[.50,.04],[.53,.10],[.56,.16],[.59,.22],[.62,.28],[.65,.34],
 [.68,.40],[.71,.46],[.74,.52],[.77,.58],[.80,.64],[.84,.71],[.88,.78],
 [.92,.85],[.96,.92],[1,1],
 [0,1],[0,.94],[.015,.86],[.005,.78],[.02,.70],[.04,.62],[.05,.54],
 [.04,.46],[.025,.38],[.02,.30],[.03,.22],[.04,.14],[.05,.07],[.05,0]
];
function inVT(x,z){let c=false;for(let i=0,j=VB.length-1;i<VB.length;j=i++){
 const[xi,yi]=VB[i],[xj,yj]=VB[j];
 if((yi>z)!==(yj>z)&&x<(xj-xi)*(z-yi)/(yj-yi)+xi)c=!c;}return c;}

/* ═══════════════════════════════════════════════════════════════
   NOISE
   ═══════════════════════════════════════════════════════════════ */
function H(a,b){let h=(a*2654435761^b*2246822519)>>>0;h=((h>>16)^h)*0x45d9f3b>>>0;return(h&0xffff)/65535;}
function sn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,
 sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy),
 a=H(ix,iy),b=H(ix+1,iy),c=H(ix,iy+1),d=H(ix+1,iy+1);
 return a+(b-a)*sx+(c-a)*sy+(a-b-c+d)*sx*sy;}
function fbm(x,y,o){let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=a*sn(x*f,y*f);f*=2.1;a*=.48;}return v;}

/* ═══════════════════════════════════════════════════════════════
   ELEVATION & COLOR
   ═══════════════════════════════════════════════════════════════ */
function elev(nx,nz){
 const rx=.42+.04*Math.sin(nz*6.3), dr=nx-rx;
 const ridge=Math.exp(-dr*dr*45)*.72;
 const mansfield=Math.exp(-((nx-.40)**2+(nz-.78)**2)*100)*.38;
 const killington=Math.exp(-((nx-.50)**2+(nz-.46)**2)*90)*.30;
 const camel=Math.exp(-((nx-.38)**2+(nz-.72)**2)*110)*.27;
 const jay=Math.exp(-((nx-.28)**2+(nz-.93)**2)*100)*.24;
 const stowe=Math.exp(-((nx-.36)**2+(nz-.75)**2)*80)*.18;
 const champlain=Math.max(0,1-nx*9)*.22;
 const ct=Math.max(0,1-(1-nx)*7)*.13*(0.4+0.6*nz);
 const base=.14+.06*(1-2*Math.abs(nx-.43));
 const n1=fbm(nx*10,nz*10,4)*.11;
 const n2=fbm(nx*25+5,nz*25+5,3)*.04;
 return Math.max(.01,base+ridge+mansfield+killington+camel+jay+stowe-champlain-ct+n1+n2);
}

const CC=[[.01,.10,.05,.18,.14,.22,.25,.15,.30,.2,.12,.35,.25,.10,.42,.30,.08,.48,.33,.06,.55,.38,.12,.62,.42,.16,.72,.48,.22,.8,.55,.3,.88,.62,.38,.95,.7,.55,1,.78,.66]];
function tColor(e){
 const t=Math.min(e/.95,1);
 const r=.06+t*.55, g=.14+t*.42, b=.08+t*.32;
 const v=(H(e*1000|0,42)-.5)*.04;
 return [Math.min(1,r+v),Math.min(1,g+v*.8),Math.min(1,b+v*.6)];
}

/* ═══════════════════════════════════════════════════════════════
   THREE.JS SCENE
   ═══════════════════════════════════════════════════════════════ */
const cv=document.getElementById('c');
const sc=new THREE.Scene();
sc.fog=new THREE.FogExp2(0x030708,.006);
const sz={w:innerWidth,h:innerHeight};
const cam=new THREE.PerspectiveCamera(50,sz.w/sz.h,.1,600);
cam.position.set(2,20,26);

const ren=new THREE.WebGLRenderer({canvas:cv,antialias:true,powerPreference:'high-performance'});
ren.setSize(sz.w,sz.h);ren.setPixelRatio(Math.min(devicePixelRatio,2));ren.setClearColor(0x030708);

const ctl=new OrbitControls(cam,cv);
ctl.enableDamping=true;ctl.dampingFactor=.05;ctl.autoRotate=true;ctl.autoRotateSpeed=.25;
ctl.maxDistance=55;ctl.minDistance=4;ctl.maxPolarAngle=Math.PI/2.15;ctl.target.set(0,0,-2);

// Lights
sc.add(new THREE.AmbientLight(0x506878,.8));
const sun=new THREE.DirectionalLight(0xffeedd,1.5);sun.position.set(12,25,10);sc.add(sun);
sc.add(new THREE.DirectionalLight(0x3060aa,.4).translateX(-12).translateY(8).translateZ(-10));
const hemi=new THREE.HemisphereLight(0x5080a0,0x203020,.5);sc.add(hemi);

// Stars
const sG=new THREE.BufferGeometry(),sC=4000,sP=new Float32Array(sC*3);
for(let i=0;i<sC*3;i++)sP[i]=(Math.random()-.5)*400;
sG.setAttribute('position',new THREE.BufferAttribute(sP,3));
sc.add(new THREE.Points(sG,new THREE.PointsMaterial({size:.15,color:0x445566,sizeAttenuation:true,depthWrite:false})));

/* ═══════════════════════════════════════════════════════════════
   TERRAIN
   ═══════════════════════════════════════════════════════════════ */
const tGrp=new THREE.Group();sc.add(tGrp);
let waterMesh;

function buildTerrain(){
 tGrp.clear();
 const vs=[],cs=[],ix=[];
 for(let iz=0;iz<=SZ;iz++){for(let jx=0;jx<=SX;jx++){
  const nx=jx/SX,nz=iz/SZ,inside=inVT(nx,nz);
  const wx=(nx-.5)*TW,wz=(nz-.5)*TH;
  let y,r,g,b;
  if(inside){
   const e=elev(nx,nz);y=e*ES*P.elev;
   [r,g,b]=tColor(e);
  } else { y=-.2;r=.012;g=.02;b=.035; }
  vs.push(wx,y,wz);cs.push(r,g,b);
 }}
 for(let iz=0;iz<SZ;iz++){for(let jx=0;jx<SX;jx++){
  const a=iz*(SX+1)+jx,b=a+1,c=a+SX+1,d=c+1;
  ix.push(a,c,b,b,c,d);
 }}
 const geo=new THREE.BufferGeometry();
 geo.setAttribute('position',new THREE.Float32BufferAttribute(vs,3));
 geo.setAttribute('color',new THREE.Float32BufferAttribute(cs,3));
 geo.setIndex(ix);geo.computeVertexNormals();
 const mesh=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({
  vertexColors:true,side:THREE.FrontSide,shininess:8,specular:0x111111,flatShading:false
 }));
 mesh.receiveShadow=true;tGrp.add(mesh);

 // Water
 const wg=new THREE.PlaneGeometry(TW*1.6,TH*1.6);wg.rotateX(-Math.PI/2);
 waterMesh=new THREE.Mesh(wg,new THREE.MeshPhongMaterial({color:0x081828,transparent:true,opacity:.92,shininess:60,specular:0x224466}));
 waterMesh.position.y=-.08;tGrp.add(waterMesh);

 // Lake Champlain
 const lg=new THREE.PlaneGeometry(1.6,9);lg.rotateX(-Math.PI/2);
 const lk=new THREE.Mesh(lg,new THREE.MeshPhongMaterial({color:0x0c2040,transparent:true,opacity:.95,shininess:80,specular:0x336688}));
 lk.position.set(-5.9,.02,1.5);tGrp.add(lk);

 // VT border glow outline
 const bPts=VB.map(([x,z])=>new THREE.Vector3((x-.5)*TW, elev(x,z)*ES*P.elev+.08, (z-.5)*TH));
 bPts.push(bPts[0].clone());
 const bGeo=new THREE.BufferGeometry().setFromPoints(bPts);
 tGrp.add(new THREE.Line(bGeo,new THREE.LineBasicMaterial({color:0x16a34a,transparent:true,opacity:.25})));
}
buildTerrain();

/* ═══════════════════════════════════════════════════════════════
   MESH NODES
   ═══════════════════════════════════════════════════════════════ */
const ZC=[0x16a34a,0x2563eb,0xd97706,0xdc2626,0x7c3aed,0x0891b2,0xc026d3,0x65a30d,0xea580c,0x0d9488,0x4f46e5,0xbe123c,0x15803d,0x1d4ed8,0xb45309,0x9f1239];
let nGrp,cLines,dataParticles;
const dataPts=[];

function placeNodes(){
 if(nGrp)sc.remove(nGrp); if(cLines)sc.remove(cLines); if(dataParticles)sc.remove(dataParticles);
 nGrp=new THREE.Group();nodePos=[];nodeZn=[];
 let n=0;const target=P.nodes;
 for(let tries=0;n<target&&tries<target*20;tries++){
  const nx=Math.random(),nz=Math.random();
  if(!inVT(nx,nz))continue;
  const e=elev(nx,nz), wx=(nx-.5)*TW, wz=(nz-.5)*TH, y=e*ES*P.elev+.18;
  nodePos.push(new THREE.Vector3(wx,y,wz));
  nodeZn.push(Math.floor(nz*P.zones)%P.zones);
  n++;
 }
 // Points
 const g=new THREE.BufferGeometry(),p=new Float32Array(n*3),c=new Float32Array(n*3),s=new Float32Array(n);
 for(let i=0;i<n;i++){
  p[i*3]=nodePos[i].x;p[i*3+1]=nodePos[i].y;p[i*3+2]=nodePos[i].z;
  const cc=new THREE.Color(ZC[nodeZn[i]%ZC.length]);
  c[i*3]=cc.r;c[i*3+1]=cc.g;c[i*3+2]=cc.b;
  s[i]=.22+Math.random()*.1;
 }
 g.setAttribute('position',new THREE.BufferAttribute(p,3));
 g.setAttribute('color',new THREE.BufferAttribute(c,3));
 g.setAttribute('size',new THREE.BufferAttribute(s,1));

 const mat=new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:`attribute float size;attribute vec3 color;varying vec3 vc;uniform float uTime;
   void main(){vc=color;vec4 mv=modelViewMatrix*vec4(position,1.);
   gl_PointSize=size*(220./-mv.z)*(1.+.18*sin(uTime*2.5+position.x*4.+position.z*3.));
   gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`varying vec3 vc;void main(){float d=length(gl_PointCoord-.5)*2.;if(d>1.)discard;
   float a=smoothstep(1.,.1,d);vec3 g=vc*1.6;
   gl_FragColor=vec4(mix(g,vc*0.8,d),a*.92);}`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
 });
 nGrp.add(new THREE.Points(g,mat));sc.add(nGrp);
 buildConns();stats();
}

/* ═══════════════════════════════════════════════════════════════
   CONNECTIONS + DATA FLOW PARTICLES
   ═══════════════════════════════════════════════════════════════ */
function buildConns(){
 if(cLines)sc.remove(cLines);if(dataParticles)sc.remove(dataParticles);
 cLines=null;dataParticles=null;dataPts.length=0;
 if(!P.conn||nodePos.length===0)return;
 const rng=(P.rf/1000)*TW*.18;
 const lv=[],lc=[];linkCount=0;
 for(let i=0;i<nodePos.length;i++){for(let j=i+1;j<nodePos.length;j++){
  const d=nodePos[i].distanceTo(nodePos[j]);
  if(d<rng){
   lv.push(nodePos[i].x,nodePos[i].y,nodePos[i].z,nodePos[j].x,nodePos[j].y,nodePos[j].z);
   const a=Math.max(.15,1-d/rng);
   lc.push(.08,.5*a,.25*a,.08,.5*a,.25*a);
   linkCount++;
   if(Math.random()<.08)dataPts.push({from:nodePos[i],to:nodePos[j],t:Math.random(),spd:.3+Math.random()*.5});
  }
 }}
 if(lv.length===0)return;
 const lg=new THREE.BufferGeometry();
 lg.setAttribute('position',new THREE.Float32BufferAttribute(lv,3));
 lg.setAttribute('color',new THREE.Float32BufferAttribute(lc,3));
 cLines=new THREE.LineSegments(lg,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.3,depthWrite:false,blending:THREE.AdditiveBlending}));
 sc.add(cLines);

 // Data flow particles
 if(P.data&&dataPts.length>0){
  const dg=new THREE.BufferGeometry();
  const dp=new Float32Array(dataPts.length*3);
  dg.setAttribute('position',new THREE.BufferAttribute(dp,3));
  dataParticles=new THREE.Points(dg,new THREE.PointsMaterial({size:.12,color:0x40ff80,sizeAttenuation:true,transparent:true,opacity:.7,depthWrite:false,blending:THREE.AdditiveBlending}));
  sc.add(dataParticles);
 }
 stats();
}
placeNodes();

/* ═══════════════════════════════════════════════════════════════
   EVENTS (VISUAL)
   ═══════════════════════════════════════════════════════════════ */
const evts=[];const EC={flood:0x3b82f6,pest:0xf97316,fire:0xef4444};
const EL={flood:'Flood Event Detected',pest:'Pest Anomaly Confirmed',fire:'Fire Signature Detected'};

function inject(type){
 if(nodePos.length===0)return;
 const idx=Math.floor(Math.random()*nodePos.length);
 const ctr=nodePos[idx].clone();
 evts.push({type,ctr,t0:clock.getElapsedTime(),col:new THREE.Color(EC[type]),mesh:null,mr:2.5+Math.random()*2.5});
 evtCount++;stats();
 // Status
 const el=document.getElementById('sysMsg');
 el.textContent='ALERT — '+EL[type];el.style.color='#f59e0b';
 setTimeout(()=>{el.textContent='Mesh Active — All Zones Nominal';el.style.color='';},4500);
 // Log
 const log=document.getElementById('eventLog');
 const d=new Date(),ts=d.toLocaleTimeString();
 log.innerHTML=`<div class="text-${type==='flood'?'blue':type==='pest'?'orange':'red'}-400">[${ts}] ${EL[type]} @ Zone ${nodeZn[idx]}</div>`+log.innerHTML;
 if(log.children.length>8)log.removeChild(log.lastChild);
}

function tickEvents(t){
 for(let i=evts.length-1;i>=0;i--){
  const ev=evts[i],age=t-ev.t0;
  if(age>5){if(ev.mesh){sc.remove(ev.mesh);ev.mesh.geometry.dispose();ev.mesh.material.dispose();}evts.splice(i,1);continue;}
  const p=age/5,r=ev.mr*p,op=(1-p)*.55;
  if(ev.mesh){sc.remove(ev.mesh);ev.mesh.geometry.dispose();ev.mesh.material.dispose();}
  const rg=new THREE.RingGeometry(Math.max(.02,r-.12),r+.06,64);rg.rotateX(-Math.PI/2);
  ev.mesh=new THREE.Mesh(rg,new THREE.MeshBasicMaterial({color:ev.col,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending}));
  ev.mesh.position.copy(ev.ctr);ev.mesh.position.y+=.08;sc.add(ev.mesh);
 }
}

/* ═══════════════════════════════════════════════════════════════
   SIMULATED LIVE DATA
   ═══════════════════════════════════════════════════════════════ */
let lastAutoEvt=0;
function simLive(t){
 // Auto events every 8-15s
 if(t-lastAutoEvt>8+Math.random()*7){
  lastAutoEvt=t;
  const types=['flood','pest','fire'];
  inject(types[Math.floor(Math.random()*3)]);
 }
 // Animate data flow particles
 if(dataParticles&&P.data){
  const arr=dataParticles.geometry.attributes.position.array;
  for(let i=0;i<dataPts.length;i++){
   const dp=dataPts[i];
   dp.t+=dp.spd*.016;if(dp.t>1)dp.t-=1;
   const v=new THREE.Vector3().lerpVectors(dp.from,dp.to,dp.t);
   arr[i*3]=v.x;arr[i*3+1]=v.y+.05;arr[i*3+2]=v.z;
  }
  dataParticles.geometry.attributes.position.needsUpdate=true;
 }
 // PDR jitter
 if(Math.floor(t)%3===0)document.getElementById('stP').textContent=(94+Math.random()*5).toFixed(0)+'%';
}

/* ═══════════════════════════════════════════════════════════════
   STATS
   ═══════════════════════════════════════════════════════════════ */
function stats(){
 document.getElementById('stN').textContent=P.nodes;
 document.getElementById('stL').textContent=linkCount.toLocaleString();
 document.getElementById('stE').textContent=evtCount;
}

/* ═══════════════════════════════════════════════════════════════
   UI BINDING
   ═══════════════════════════════════════════════════════════════ */
function sl(id,vId,key,cb){const e=document.getElementById(id),v=document.getElementById(vId);
 if(!e)return;e.oninput=()=>{P[key]=parseFloat(e.value);if(v)v.textContent=e.value;if(cb)cb();};}

sl('s_nodes','v_nodes','nodes',placeNodes);
sl('s_rf','v_rf','rf',buildConns);
sl('s_zones','v_zones','zones',placeNodes);
sl('s_elev','v_elev','elev',()=>{buildTerrain();placeNodes();});

document.getElementById('cConn').onchange=e=>{P.conn=e.target.checked;buildConns();};
document.getElementById('cRot').onchange=e=>{ctl.autoRotate=e.target.checked;};
document.getElementById('cData').onchange=e=>{P.data=e.target.checked;};
document.getElementById('bFlood').onclick=()=>inject('flood');
document.getElementById('bPest').onclick=()=>inject('pest');
document.getElementById('bFire').onclick=()=>inject('fire');

// Navigation
let curView='overview',flying=false,flyT=0;
const fS=new THREE.Vector3(),fE=new THREE.Vector3(),fST=new THREE.Vector3(),fET=new THREE.Vector3();
document.getElementById('warpBtn').onclick=()=>{
 if(flying)return;flying=true;flyT=0;
 fS.copy(cam.position);fST.copy(ctl.target);
 if(curView==='overview'){curView='mtn';fE.set(-1,6,1);fET.set(-1,1.5,-2);
  document.getElementById('warpTxt').textContent='Return to Overview';
  document.getElementById('warpIco').setAttribute('icon','lucide:maximize-2');
 }else{curView='overview';fE.set(2,20,26);fET.set(0,0,-2);
  document.getElementById('warpTxt').textContent='Fly to Green Mountains';
  document.getElementById('warpIco').setAttribute('icon','lucide:mountain-snow');
 }
 ctl.enabled=false;
};

document.getElementById('resetBtn').onclick=()=>{
 P.nodes=200;P.rf=800;P.zones=8;P.elev=1;P.conn=true;P.rot=true;P.data=true;
 document.getElementById('s_nodes').value=200;document.getElementById('v_nodes').textContent='200';
 document.getElementById('s_rf').value=800;document.getElementById('v_rf').textContent='800';
 document.getElementById('s_zones').value=8;document.getElementById('v_zones').textContent='8';
 document.getElementById('s_elev').value='1.0';document.getElementById('v_elev').textContent='1.0';
 document.getElementById('cConn').checked=true;document.getElementById('cRot').checked=true;document.getElementById('cData').checked=true;
 ctl.autoRotate=true;buildTerrain();placeNodes();
 cam.position.set(2,20,26);ctl.target.set(0,0,-2);curView='overview';
 document.getElementById('warpTxt').textContent='Fly to Green Mountains';
 document.getElementById('warpIco').setAttribute('icon','lucide:mountain-snow');
};

/* ═══════════════════════════════════════════════════════════════
   RESIZE
   ═══════════════════════════════════════════════════════════════ */
onresize=()=>{sz.w=innerWidth;sz.h=innerHeight;cam.aspect=sz.w/sz.h;cam.updateProjectionMatrix();ren.setSize(sz.w,sz.h);ren.setPixelRatio(Math.min(devicePixelRatio,2));};

/* ═══════════════════════════════════════════════════════════════
   RENDER LOOP
   ═══════════════════════════════════════════════════════════════ */
const clock=new THREE.Clock();
setTimeout(()=>document.getElementById('loading').classList.add('hide'),600);

(function tick(){
 const dt=clock.getDelta(),t=clock.getElapsedTime();

 if(flying){flyT+=dt/2.2;const s=flyT*flyT*(3-2*flyT);
  cam.position.lerpVectors(fS,fE,Math.min(s,1));
  ctl.target.lerpVectors(fST,fET,Math.min(s,1));
  if(flyT>=1){flying=false;ctl.enabled=true;}
 }else{ctl.update();}

 // Shader time
 if(nGrp?.children[0])nGrp.children[0].material.uniforms.uTime.value=t;
 // Water
 if(waterMesh)waterMesh.position.y=-.08+Math.sin(t*.4)*.025;
 // Events
 tickEvents(t);
 // Live sim
 simLive(t);
 // Camera info
 const cp=document.getElementById('camPos');
 if(cp){const{x,y,z}=cam.position;cp.textContent=`CAM ${x.toFixed(0)}, ${y.toFixed(0)}, ${z.toFixed(0)}`;}

 ren.render(sc,cam);requestAnimationFrame(tick);
})();
</script>
</body></html>
